version: '3.8'

services:
  dashboard:
    build: .
    env_file: .env
    ports:
      - "5050:5050"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  fetcher:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "fetcher.py"]
    restart: "no"
